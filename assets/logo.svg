<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Taekeon Logo - Stylized Star Flower -->
  <g transform="translate(100,90)">
    <!-- Petals -->
    <!-- Top petal (green) -->
    <path d="M0,-70 C12,-45 12,-25 0,0 C-12,-25 -12,-45 0,-70Z" fill="#6B8E3A"/>
    <!-- Top-right petal (orange) -->
    <path d="M0,0 C8,-22 25,-40 55,-50 C40,-25 22,-8 0,0Z" fill="#D4842A" transform="rotate(0)"/>
    <!-- Right petal (green) -->
    <path d="M0,0 C15,-15 40,-18 65,-5 C45,15 22,18 0,0Z" fill="#7BA23C"/>
    <!-- Bottom-right petal (orange/golden) -->
    <path d="M0,0 C20,5 38,22 45,50 C20,40 5,22 0,0Z" fill="#C9933E"/>
    <!-- Bottom-left petal (green) -->
    <path d="M0,0 C-20,5 -38,22 -45,50 C-20,40 -5,22 0,0Z" fill="#5A7E2E"/>
    <!-- Left petal (orange) -->
    <path d="M0,0 C-15,-15 -40,-18 -65,-5 C-45,15 -22,18 0,0Z" fill="#D4842A"/>
    <!-- Top-left petal (green) -->
    <path d="M0,0 C-8,-22 -25,-40 -55,-50 C-40,-25 -22,-8 0,0Z" fill="#6B8E3A"/>
    <!-- Center triangle (dark blue) -->
    <path d="M-6,-8 L6,-8 L0,5Z" fill="#2C3E6B"/>
  </g>
</svg>
